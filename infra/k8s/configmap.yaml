apiVersion: v1
kind: ConfigMap
metadata:
  name: saganet-config
  namespace: saganet
data:
  # Database
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: saganet

  # Kafka
  KAFKA_BROKERS: kafka:29092
  KAFKAJS_NO_PARTITIONER_WARNING: "1"

  # Redis
  REDIS_URL: redis://redis:6379

  # Service Ports
  API_GATEWAY_PORT: "3000"
  AUTH_SERVICE_PORT: "3001"
  CATALOG_SERVICE_PORT: "3002"
  INVENTORY_SERVICE_PORT: "3003"
  ORDER_SERVICE_PORT: "3004"
  PAYMENT_SERVICE_PORT: "3005"
  NOTIFICATION_SERVICE_PORT: "3006"
  WEB_PORT: "3333"

  # Service URLs (internal DNS)
  AUTH_SERVICE_URL: http://auth-service:3001
  CATALOG_SERVICE_URL: http://catalog-service:3002
  INVENTORY_SERVICE_URL: http://inventory-service:3003
  ORDER_SERVICE_URL: http://order-service:3004
  PAYMENT_SERVICE_URL: http://payment-service:3005
  NOTIFICATION_SERVICE_URL: http://notification-service:3006

  # Observability
  JAEGER_ENDPOINT: http://jaeger:4318/v1/traces
  LOG_LEVEL: info

  # Storage (MinIO)
  MINIO_ENDPOINT: http://minio:9000
  MINIO_PUBLIC_URL: http://minio:9000
  MINIO_REGION: us-east-1
  MINIO_BUCKET: saganet

  # Payment
  PAYMENT_PROVIDER: mock

  # CORS — update for your domain
  ALLOWED_ORIGINS: https://saganet.com,https://www.saganet.com

  # App
  APP_BASE_URL: https://api.saganet.com
  FRONTEND_URL: https://saganet.com
  NODE_ENV: production
