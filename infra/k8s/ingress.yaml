apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: saganet-ingress
  namespace: saganet
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - saganet.com
        - www.saganet.com
        - api.saganet.com
      secretName: saganet-tls
  rules:
    # API Gateway — api.saganet.com
    - host: api.saganet.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000

    # Web frontend — saganet.com + www
    - host: saganet.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3333

    - host: www.saganet.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3333
