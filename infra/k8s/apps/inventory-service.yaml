apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: saganet
  labels:
    app: inventory-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: ghcr.io/saganet/inventory-service:latest
          ports:
            - containerPort: 3003
          envFrom:
            - configMapRef:
                name: saganet-config
            - secretRef:
                name: saganet-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3003
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: saganet
spec:
  selector:
    app: inventory-service
  ports:
    - port: 3003
      targetPort: 3003
