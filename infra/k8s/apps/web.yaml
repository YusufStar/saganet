apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: saganet
  labels:
    app: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ghcr.io/saganet/web:latest
          ports:
            - containerPort: 3333
          env:
            - name: NEXT_PUBLIC_API_URL
              value: https://api.saganet.com
            - name: PORT
              value: "3333"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3333
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3333
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: saganet
spec:
  selector:
    app: web
  ports:
    - port: 3333
      targetPort: 3333
