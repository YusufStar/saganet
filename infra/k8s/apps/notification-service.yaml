apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: saganet
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: ghcr.io/saganet/notification-service:latest
          ports:
            - containerPort: 3006
          envFrom:
            - configMapRef:
                name: saganet-config
            - secretRef:
                name: saganet-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3006
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3006
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: saganet
spec:
  selector:
    app: notification-service
  ports:
    - port: 3006
      targetPort: 3006
