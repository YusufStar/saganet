apiVersion: v1
kind: Secret
metadata:
  name: saganet-secrets
  namespace: saganet
type: Opaque
stringData:
  # ─── Database ──────────────────────────────────────────────────────────────
  DB_USERNAME: postgres
  DB_PASSWORD: <generate: openssl rand -hex 16>
  DATABASE_URL: postgresql://postgres:<DB_PASSWORD>@postgres:5432/saganet

  # ─── JWT ───────────────────────────────────────────────────────────────────
  JWT_SECRET: <generate: openssl rand -hex 32>
  JWT_ACCESS_EXPIRES_IN: "15m"
  JWT_REFRESH_EXPIRES_IN: "7d"

  # ─── Internal Security ────────────────────────────────────────────────────
  INTERNAL_SECRET: <generate: openssl rand -hex 32>

  # ─── MinIO / S3 ───────────────────────────────────────────────────────────
  MINIO_ACCESS_KEY: <generate: openssl rand -hex 16>
  MINIO_SECRET_KEY: <generate: openssl rand -hex 16>

  # ─── SMTP ──────────────────────────────────────────────────────────────────
  SMTP_HOST: smtp.example.com
  SMTP_PORT: "465"
  SMTP_SECURE: "true"
  SMTP_USER: noreply@yourdomain.com
  SMTP_PASSWORD: <your-smtp-password>
  SMTP_FROM: noreply@yourdomain.com

  # ─── Admin Seed ────────────────────────────────────────────────────────────
  ADMIN_EMAIL: admin@yourdomain.com
  ADMIN_PASSWORD: <strong-admin-password>
