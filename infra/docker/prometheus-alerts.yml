groups:
  - name: saganet-service-alerts
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} has been down for more than 1 minute."

      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[5m])) by (job)
          /
          sum(rate(http_requests_total[5m])) by (job) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: "Error rate is {{ $value | humanizePercentage }} for {{ $labels.job }}"

      - alert: HighPaymentFailureRate
        expr: |
          sum(rate(payment_failed_total[5m])) by (job)
          /
          (sum(rate(payment_sent_total[5m])) by (job) + 0.001) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High payment failure rate"
          description: "Payment failure rate exceeds 10%"

      - alert: KafkaConsumerLag
        expr: kafka_consumer_lag > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Kafka consumer lag is high"
          description: "Consumer group {{ $labels.group }} has lag of {{ $value }}"

      - alert: DLQMessagesAccumulating
        expr: sum(increase(kafka_dlq_messages_total[5m])) by (topic) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "DLQ messages accumulating on {{ $labels.topic }}"
          description: "{{ $value }} messages were sent to DLQ in the last 5 minutes for topic {{ $labels.topic }}"

      - alert: LowInventory
        expr: inventory_low_stock_total > 0
        labels:
          severity: info
        annotations:
          summary: "Low stock alert"
          description: "{{ $value }} products are low on stock"
