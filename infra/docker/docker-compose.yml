networks:
  saganet:
    driver: bridge

services:
  # ═══════════════════════════════════════════════════════════════════════════════
  # INFRASTRUCTURE
  # ═══════════════════════════════════════════════════════════════════════════════

  postgres:
    image: postgres:16-alpine
    container_name: saganet-postgres
    restart: on-failure:5
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saganet
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saganet

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: saganet-zookeeper
    restart: on-failure:5
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - saganet

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: saganet-kafka
    restart: on-failure:5
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ['CMD', 'kafka-broker-api-versions', '--bootstrap-server', 'localhost:9092']
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - saganet

  redis:
    image: redis:7-alpine
    container_name: saganet-redis
    restart: on-failure:5
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saganet

  minio:
    image: minio/minio:RELEASE.2025-04-03T14-56-28Z
    container_name: saganet-minio
    restart: on-failure:5
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saganet

  minio-init:
    image: minio/mc:RELEASE.2025-04-03T17-07-56Z
    container_name: saganet-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/saganet &&
      mc anonymous set download local/saganet &&
      echo 'MinIO bucket ready' &&
      exit 0
      "
    restart: 'no'
    networks:
      - saganet

  # ═══════════════════════════════════════════════════════════════════════════════
  # OBSERVABILITY
  # ═══════════════════════════════════════════════════════════════════════════════

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: saganet-jaeger
    restart: on-failure:5
    ports:
      - '16686:16686'   # UI — exposed for dev
      - '4318:4318'     # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    networks:
      - saganet

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: saganet-prometheus
    restart: on-failure:5
    ports:
      - '9090:9090'     # UI — exposed for dev
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml:ro
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:9090/-/healthy']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saganet

  grafana:
    image: grafana/grafana:11.4.0
    container_name: saganet-grafana
    restart: on-failure:5
    depends_on:
      - prometheus
    ports:
      - '4000:3000'     # UI — exposed for dev
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - saganet

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: saganet-kafka-ui
    restart: on-failure:5
    depends_on:
      - kafka
    ports:
      - '8080:8080'     # UI — exposed for dev
    environment:
      KAFKA_CLUSTERS_0_NAME: saganet
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - saganet

  # ═══════════════════════════════════════════════════════════════════════════════
  # CHAOS ENGINEERING
  # ═══════════════════════════════════════════════════════════════════════════════

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    container_name: saganet-toxiproxy
    restart: on-failure:5
    ports:
      - '8474:8474'     # Toxiproxy API — exposed for chaos script
    volumes:
      - ./toxiproxy.json:/config/toxiproxy.json:ro
    command: ['-host=0.0.0.0', '-config=/config/toxiproxy.json']
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - saganet

  # ═══════════════════════════════════════════════════════════════════════════════
  # MICROSERVICES (internal network only — no exposed ports)
  # ═══════════════════════════════════════════════════════════════════════════════

  auth-service:
    build:
      context: ../..
      dockerfile: apps/auth-service/Dockerfile
    container_name: saganet-auth
    restart: on-failure:5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file: ../../.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/saganet
      DB_HOST: postgres
      DB_PORT: 5432
      KAFKA_BROKERS: kafka:29092
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_URL: http://minio:9000
      JAEGER_ENDPOINT: http://jaeger:4318/v1/traces
      AUTH_SERVICE_PORT: 3001
    networks:
      - saganet

  catalog-service:
    build:
      context: ../..
      dockerfile: apps/catalog-service/Dockerfile
    container_name: saganet-catalog
    restart: on-failure:5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file: ../../.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/saganet
      DB_HOST: postgres
      DB_PORT: 5432
      KAFKA_BROKERS: kafka:29092
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_URL: http://minio:9000
      JAEGER_ENDPOINT: http://jaeger:4318/v1/traces
      CATALOG_SERVICE_PORT: 3002
    networks:
      - saganet

  inventory-service:
    build:
      context: ../..
      dockerfile: apps/inventory-service/Dockerfile
    container_name: saganet-inventory
    restart: on-failure:5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file: ../../.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/saganet
      DB_HOST: postgres
      DB_PORT: 5432
      KAFKA_BROKERS: kafka:29092
      REDIS_URL: redis://redis:6379
      JAEGER_ENDPOINT: http://jaeger:4318/v1/traces
      INVENTORY_SERVICE_PORT: 3003
    networks:
      - saganet

  order-service:
    build:
      context: ../..
      dockerfile: apps/order-service/Dockerfile
    container_name: saganet-order
    restart: on-failure:5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file: ../../.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/saganet
      DB_HOST: postgres
      DB_PORT: 5432
      KAFKA_BROKERS: kafka:29092
      REDIS_URL: redis://redis:6379
      JAEGER_ENDPOINT: http://jaeger:4318/v1/traces
      ORDER_SERVICE_PORT: 3004
    networks:
      - saganet

  payment-service:
    build:
      context: ../..
      dockerfile: apps/payment-service/Dockerfile
    container_name: saganet-payment
    restart: on-failure:5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file: ../../.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/saganet
      DB_HOST: postgres
      DB_PORT: 5432
      KAFKA_BROKERS: kafka:29092
      REDIS_URL: redis://redis:6379
      JAEGER_ENDPOINT: http://jaeger:4318/v1/traces
      PAYMENT_SERVICE_PORT: 3005
    networks:
      - saganet

  notification-service:
    build:
      context: ../..
      dockerfile: apps/notification-service/Dockerfile
    container_name: saganet-notification
    restart: on-failure:5
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: ../../.env
    environment:
      KAFKA_BROKERS: kafka:29092
      REDIS_URL: redis://redis:6379
      JAEGER_ENDPOINT: http://jaeger:4318/v1/traces
      NOTIFICATION_SERVICE_PORT: 3006
    networks:
      - saganet

  # ═══════════════════════════════════════════════════════════════════════════════
  # EXPOSED SERVICES (gateway + web — the only public-facing containers)
  # ═══════════════════════════════════════════════════════════════════════════════

  api-gateway:
    build:
      context: ../..
      dockerfile: apps/api-gateway/Dockerfile
    container_name: saganet-gateway
    restart: on-failure:5
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
      catalog-service:
        condition: service_started
      inventory-service:
        condition: service_started
      order-service:
        condition: service_started
      payment-service:
        condition: service_started
      notification-service:
        condition: service_started
    ports:
      - '3000:3000'     # The only backend port exposed externally
    env_file: ../../.env
    environment:
      API_GATEWAY_PORT: 3000
      REDIS_URL: redis://redis:6379
      JAEGER_ENDPOINT: http://jaeger:4318/v1/traces
      # Internal service URLs — Docker DNS resolves container names
      AUTH_SERVICE_URL: http://auth-service:3001
      CATALOG_SERVICE_URL: http://catalog-service:3002
      INVENTORY_SERVICE_URL: http://inventory-service:3003
      ORDER_SERVICE_URL: http://order-service:3004
      PAYMENT_SERVICE_URL: http://payment-service:3005
      NOTIFICATION_SERVICE_URL: http://notification-service:3006
      ALLOWED_ORIGINS: http://localhost:3333,http://web:3333
    networks:
      - saganet

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: saganet-web
    restart: on-failure:5
    depends_on:
      - api-gateway
    ports:
      - '3333:3333'     # The only frontend port exposed externally
    environment:
      NEXT_PUBLIC_API_URL: http://api-gateway:3000
      PORT: 3333
    networks:
      - saganet

volumes:
  postgres-data:
  redis-data:
  grafana-data:
  minio-data:
